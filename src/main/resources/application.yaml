server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: spring-order-confirmation
  jackson:
    property-naming-strategy: SNAKE_CASE

app:
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  mailtrap:
    api-token: ${MAILTRAP_API_TOKEN:}
    template-uuid: ${MAILTRAP_TEMPLATE_UUID:}
    from-email: ${MAIL_FROM_ADDRESS:}
    from-name: ${MAIL_FROM_NAME:Order Confirmation}
    fallback-recipient: ${MAIL_ORDER_RECIPIENT:}
    sandbox: ${MAILTRAP_SANDBOX:false}
    inbox-id: ${MAILTRAP_INBOX_ID:0}
